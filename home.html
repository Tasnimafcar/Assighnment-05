<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assighnment-05</title>
    <!-- Tailwind  & daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Favicon -->
    <link rel="shortcut icon" href="assets/test.png" type="image/x-icon">
    <!-- font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body>
    <!-- Top Navigation -->
    <section class="bg-white shadow-sm border-b border-gray-200 px-6 py-3">
        <div class="flex justify-between ">
            <!-- Left nav -->
            <h1 class="text-[30px] font-semibold text-gray-800">All Issus</h1>

            <!-- Right nav -->
            <div class="join">
                <div>
                    <label class="input validator join-item">
                        <input type="text" placeholder="Search Issus..." required />
                    </label>

                    <div class="validator-hint hidden">Enter Issus</div>
                </div>
                <button id="searchBtn" class="btn btn-neutral join-item rounded-md bg-[#4A00FF]">Search</button>
            </div>
        </div>
    </section>

    <!-- Filter section -->
    <section class="px-6 py-3">
        <div class="flex gap-2">
            <button id="allbtn" class="btn rounded-md bg-[#4A00FF] text-white">All</button>
            <button id="openbtn" class="btn rounded-md bg-white border border-gray-300 text-gray-700">Open</button>
            <button id="closedbtn" class="btn rounded-md bg-white border border-gray-300 text-gray-700">Closed</button>
        </div>
    </section>

    <!-- Issus Count section -->
    <section class="flex justify-between items-center px-6 py-4 bg-white shadow-sm">

        <!-- Left -->
        <div class="flex items-center gap-3">
            <img src="./assets/Aperture.png" class="w-12 h-12" alt="">
            <div>
                <h2 class="font-semibold text-[20px]">
                    <span id="issusCount"></span>
                    Issus
                </h2>
                <p class="text-[#64748B] text-[16px]">Track and manage your project issues</p>
            </div>
        </div>

        <!-- Right -->
        <div class="flex items-center gap-4">
            <span class="flex items-center gap-1 text-[16px]">
                <span class="w-2 h-2 rounded-full bg-green-500 inline-block font-medium"></span>Open
            </span>

            <span class="flex items-center gap-1 text-[16px]">
                <span class="w-2 h-2 rounded-full bg-purple-500 inline-block font-medium"></span>Closed
            </span>
        </div>
    </section>

    <!-- Issus Cards -->
    <div id="issueContainer" class="grid grid-cols-4 gap-4 px-6 py-4">

        <div class=" bg-white shadow-sm border-t-4 border-green-500 rounded-lg flex flex-col gap-3 p-4 hover:shadow-md transition-shadow cursor-pointer">

            <!-- Top Icon + priority -->
            <div class="flex justify-between items-center">
                <img src="./assets/Open-Status.png" alt="">
                <span class="font-medium text-[12px] rounded-full text-orange-700 bg-orange-200 px-3 py-1">HIGH</span>
            </div>

            <!-- Tittle -->
            <h3 class="font-bold text-[16px]">Fix navigation menu on mobile devices</h3>

            <!-- Description -->
            <p class="text-[14px] text-[#64748B]">The navigation menu doesn't collapse properly <br>on mobile devices...
            </p>

            <!-- labels -->
            <div class="flex gap-2 pb-[16px] border-b border-slate-300 flex-wrap">
                <span class="font-medium text-[14px] rounded-full text-orange-700 bg-orange-200 px-3 py-1">BUG</span>
                <span class="font-medium text-[14px] rounded-full text-yellow-700 bg-yellow-200 px-3 py-1">HELP
                    WANTED</span>
            </div>

            <!-- Footer -->
             <div class="text-gray-400 text-[14px] mt-2 space-y-1">
                <p>#1 by john_doe</p>
                <p class="pl-2">1/15/2024</p>
             </div>
        </div>
    </div>


    <!-- script js -->
    <script src="./script.js"></script>
</body>

</html>
