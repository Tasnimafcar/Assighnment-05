<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assighnment-05</title>
    <!-- Tailwind  & daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Favicon -->
    <link rel="shortcut icon" href="assets/test.png" type="image/x-icon">
    <!-- font -->
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Geist', sans-serif;
        }
    </style>

</head>

<body>
    <!-- Top Navigation -->
    <section class="bg-white shadow-sm border-b border-gray-200 px-6 py-3">
        <div class="flex justify-between ">
            <!-- Left nav -->
            <h1 class="text-[30px] font-semibold text-gray-800">All Issus</h1>

            <!-- Right nav -->
            <div class="join">
                <div>
                    <label class="input validator join-item">
                        <input id="searchInput" type="text" placeholder="Search Issus..." required />
                    </label>

                    <div class="validator-hint hidden">Enter Issus</div>
                </div>
                <button id="searchBtn" class="btn btn-neutral join-item rounded-md bg-[#4A00FF]">Search</button>
            </div>
        </div>
    </section>

    <!-- Filter section -->
    <section class="px-6 py-3">
        <div class="flex gap-2">
            <button id="allbtn" class="btn rounded-md bg-[#4A00FF] text-white">All</button>
            <button id="openbtn" class="btn rounded-md bg-white border border-gray-300 text-gray-700">Open</button>
            <button id="closedbtn" class="btn rounded-md bg-white border border-gray-300 text-gray-700">Closed</button>
        </div>
    </section>

    <!-- Issus Count section -->
    <section class="flex justify-between items-center px-6 py-4 bg-white shadow-sm">

        <!-- Left -->
        <div class="flex items-center gap-3">
            <img src="./assets/Aperture.png" class="w-12 h-12" alt="">
            <div>
                <h2 class="font-semibold text-[20px]">
                    <span id="issusCount"></span>
                    Issus
                </h2>
                <p class="text-[#64748B] text-[16px]">Track and manage your project issues</p>
            </div>
        </div>

        <!-- Right -->
        <div class="flex items-center gap-4">
            <span class="flex items-center gap-1 text-[16px]">
                <span class="w-2 h-2 rounded-full bg-green-500 inline-block font-medium"></span>Open
            </span>

            <span class="flex items-center gap-1 text-[16px]">
                <span class="w-2 h-2 rounded-full bg-purple-500 inline-block font-medium"></span>Closed
            </span>
        </div>
    </section>

    <!-- Issus Cards -->
    <div id="issueContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 px-6 py-4 mt-4 mb-6">
        <!-- Dynamically append here -->
    </div>

    <!-- Details Modal -->
    <dialog id="Issue-details-modal" class="modal">
        <div class="modal-box">

            <!-- tittle -->
            <h1 id="modalTitle" class="font-bold text-[24px] mb-[6px]">Fix broken image uploads</h1>

            <!-- Status + author + createdAt -->
            <div class="flex items-center gap-4">
                <p id="modalStatus" class="font-medium text-[12px] text-white bg-green-600 rounded-full px-2 py-1">
                    Opened</p>

                <span id="modalAuthor" class="flex items-center gap-1 text-[12px] text-[#64748B]">
                    <span class="w-2 h-2 rounded-full bg-gray-500 inline-block font-medium"></span>Opend by fahim ahmed
                </span>

                <span id="modalDate" class="flex items-center gap-1 text-[12px] text-[#64748B]">
                    <span class="w-2 h-2 rounded-full bg-gray-500 inline-block font-medium"></span>22/02/2026
                </span>
            </div>

            <!-- label -->
            <div id="modalLabels" class="flex gap-2 pb-[16px] flex-wrap mt-[18px]">
                <p class="font-medium text-[12px] text-[#EF4444] bg-[#FECACA] rounded-full px-2 py-1">BUG</p>
                <p class="font-medium text-[12px] text-[#EF4444] bg-[#FECACA] rounded-full px-2 py-1">HELP WANTED</p>
            </div>

            <!-- description -->
            <p id="modalDescription" class="mt-[10px] text-[#64748B] text-[16px]">Lorem ipsum dolor sit amet consectetur
                adipisicing elit.
                Officia, expedita.</p>

            <!-- Assignee + priority-->
            <div class="flex justify-between items-center px-4 mt-[18px] bg-slate-50 shadow-sm h-12 rounded-md">
                <p class="pl-2">Assignee: <span id="modalAssignee" class="font-semibold text-[16px]">Fahim</span></p>
                <p>priority: <span id="modalPriority"
                        class="font-medium text-[12px] text-white bg-[#EF4444] px-2 py-1 rounded-full">HIGH</span></p>
            </div>

            <div class="modal-action">
                <form method="dialog">
                    <button id="modalBtn" class="btn btn-primary">Close</button>
                </form>
            </div>

        </div>


    </dialog>

    <!-- script js -->
    <script src="./script.js"></script>
</body>

</html>
